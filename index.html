<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>传统企业 AI 转型之道：少走弯路 2.0</title>
    <meta
      name="description"
      content="面向传统企业老板与高管的 AI 转型闭门分享 HTML PPT 2.0。"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700;900&display=swap");

      :root {
        --stage-bg: #10182b;
        --slide-bg: #1c2644;
        --navy: #1c2644;
        --navy-2: #232f55;
        --navy-3: #151f38;
        --cream: #f0ece3;
        --cream-2: #e2dcd0;
        --gold: #c8a870;
        --gold-2: #ead4a5;
        --muted: #96a1b5;
        --line: rgba(240, 236, 227, 0.18);
        --line-strong: rgba(200, 168, 112, 0.5);
        --danger: #d97972;
        --success: #9fcfbb;
        --shadow: 0 34px 90px rgba(5, 8, 18, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--stage-bg);
      }

      body {
        font-family: "DM Sans", "Noto Serif SC", sans-serif;
      }

      .deck-viewport {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 8%, rgba(200, 168, 112, 0.15), transparent 34%),
          radial-gradient(circle at 88% 78%, rgba(55, 70, 120, 0.42), transparent 42%),
          var(--stage-bg);
      }

      .deck-stage {
        position: absolute;
        left: 0;
        top: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-origin: 0 0;
        background: var(--slide-bg);
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
      }

      .slide {
        position: absolute;
        inset: 0;
        display: block;
        visibility: hidden;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        background: var(--slide-bg);
        color: var(--cream);
      }

      .slide.active,
      .slide.visible {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
        z-index: 1;
      }

      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(240, 236, 227, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(240, 236, 227, 0.035) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0.48;
      }

      .slide::after {
        content: "";
        position: absolute;
        inset: 72px;
        border: 1px solid var(--line);
        pointer-events: none;
      }

      .slide > * {
        position: relative;
        z-index: 1;
      }

      img,
      video,
      canvas,
      svg {
        max-width: 100%;
        max-height: 100%;
      }

      .masthead,
      .footer {
        position: absolute;
        left: 118px;
        right: 118px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--muted);
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 19px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .masthead {
        top: 96px;
      }

      .footer {
        bottom: 92px;
        font-size: 16px;
      }

      .mark,
      .kicker,
      .eyebrow,
      .page,
      .gold {
        color: var(--gold);
      }

      .content {
        position: absolute;
        left: 118px;
        top: 214px;
        width: 1504px;
      }

      .wide-content {
        width: 1684px;
      }

      .cover .content {
        top: 246px;
        width: 1190px;
      }

      h1,
      h2,
      h3,
      p,
      ul,
      ol {
        margin-top: 0;
      }

      h1,
      h2,
      .statement-text,
      .formula {
        font-family: "Noto Serif SC", serif;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        color: var(--cream);
        font-size: 112px;
        font-weight: 900;
        line-height: 1.07;
      }

      h1 em,
      h2 em {
        color: var(--gold);
        font-style: normal;
      }

      h2 {
        max-width: 1340px;
        margin: 0 0 40px;
        color: var(--cream);
        font-size: 70px;
        font-weight: 900;
        line-height: 1.14;
      }

      h3 {
        margin: 0 0 14px;
        color: var(--cream);
        font-size: 33px;
        line-height: 1.22;
      }

      p,
      li {
        color: var(--cream-2);
        font-size: 24px;
        line-height: 1.46;
      }

      ul,
      ol {
        margin-bottom: 0;
        padding-left: 1.18em;
      }

      li {
        margin: 9px 0;
      }

      strong {
        color: var(--cream);
      }

      .kicker,
      .eyebrow {
        margin: 0 0 26px;
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .subtitle {
        width: 980px;
        margin-top: 38px;
        color: var(--cream-2);
        font-size: 34px;
        line-height: 1.5;
      }

      .speaker {
        position: absolute;
        left: 118px;
        bottom: 106px;
        display: grid;
        grid-template-columns: 170px 1fr;
        gap: 28px;
        align-items: center;
      }

      .speaker strong {
        display: block;
        color: var(--cream);
        font-size: 38px;
        line-height: 1;
      }

      .speaker span {
        color: var(--muted);
        font-size: 23px;
      }

      .rule {
        height: 1px;
        background: var(--gold);
      }

      .side-panel {
        position: absolute;
        right: 118px;
        top: 252px;
        width: 395px;
        height: 602px;
        border-left: 1px solid var(--line);
        padding-left: 42px;
      }

      .panel-item {
        padding: 0 0 42px;
        margin-bottom: 38px;
        border-bottom: 1px solid var(--line);
      }

      .panel-item b {
        display: block;
        margin-bottom: 12px;
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 22px;
      }

      .panel-item span {
        color: var(--cream);
        font-size: 28px;
        font-weight: 800;
      }

      .cover-badge {
        position: absolute;
        right: 118px;
        bottom: 106px;
        display: grid;
        width: 395px;
        height: 86px;
        place-items: center;
        border: 1px solid rgba(200, 168, 112, 0.55);
        color: rgba(240, 236, 227, 0.66);
        font-family: "IBM Plex Mono", monospace;
        font-size: 17px;
        letter-spacing: 0.08em;
      }

      .grid-2,
      .grid-3,
      .grid-4 {
        display: grid;
        gap: 24px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .card,
      .panel,
      .quote-box,
      .formula-card,
      .worksheet,
      .table-card,
      .tool-pill,
      .voice,
      .case-step,
      .ledger-row,
      .story-card {
        border: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
          rgba(255, 255, 255, 0.035);
        box-shadow: var(--shadow);
      }

      .card,
      .panel {
        min-height: 240px;
        padding: 34px;
      }

      .card.accent,
      .panel.accent,
      .case-step.accent,
      .tool-pill.hot {
        border-color: var(--line-strong);
        background:
          linear-gradient(135deg, rgba(200, 168, 112, 0.2), rgba(255, 255, 255, 0.04)),
          rgba(255, 255, 255, 0.045);
      }

      .tag,
      .num,
      .icon-num {
        display: inline-grid;
        min-width: 54px;
        height: 46px;
        margin-bottom: 24px;
        padding: 0 14px;
        place-items: center;
        border: 1px solid rgba(200, 168, 112, 0.42);
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        font-weight: 800;
      }

      .card p,
      .panel p {
        margin-bottom: 0;
      }

      .card b {
        display: block;
        margin-top: 20px;
        color: var(--gold-2);
        font-size: 23px;
        line-height: 1.34;
      }

      .bottom-line,
      .note-strip,
      .closing-line,
      .asset-equation {
        margin-top: 30px;
        padding: 22px 28px;
        border-left: 4px solid var(--gold);
        background: rgba(200, 168, 112, 0.12);
        color: var(--cream);
        font-size: 28px;
        font-weight: 800;
        line-height: 1.4;
      }

      .statement-slide .content {
        top: 190px;
      }

      .statement-text {
        max-width: 1320px;
        padding: 48px 54px;
        border: 1px solid rgba(240, 236, 227, 0.18);
        background: rgba(255, 255, 255, 0.06);
        color: var(--cream);
        font-size: 58px;
        font-weight: 900;
        line-height: 1.24;
      }

      .metric-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 22px;
        width: 990px;
        margin-top: 36px;
      }

      .metric-strip div {
        padding: 24px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.045);
      }

      .metric-strip strong {
        display: block;
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 52px;
        line-height: 1;
      }

      .metric-strip span {
        display: block;
        margin-top: 10px;
        color: var(--cream);
        font-size: 24px;
        font-weight: 800;
      }

      .tool-wall {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 16px;
        width: 1460px;
      }

      .tool-pill {
        display: grid;
        min-height: 86px;
        place-items: center;
        color: var(--cream);
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 26px;
        font-weight: 800;
        text-align: center;
      }

      .tool-pill.dim {
        color: rgba(240, 236, 227, 0.48);
      }

      .voice-stack {
        display: grid;
        gap: 20px;
        width: 1320px;
      }

      .voice {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 28px;
        align-items: center;
        min-height: 138px;
        padding: 28px 34px;
      }

      .voice b {
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 32px;
      }

      .voice span {
        color: var(--cream);
        font-family: "Noto Serif SC", serif;
        font-size: 42px;
        font-weight: 900;
        line-height: 1.24;
      }

      .pain-meter {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
        width: 1390px;
      }

      .pain-meter article {
        min-height: 290px;
        padding: 34px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
      }

      .pain-meter strong {
        display: block;
        margin-bottom: 16px;
        color: var(--gold);
        font-size: 54px;
        line-height: 1;
      }

      .pain-meter span {
        display: block;
        margin-bottom: 18px;
        color: var(--cream);
        font-size: 30px;
        font-weight: 900;
      }

      .question-stack {
        display: grid;
        gap: 18px;
        width: 1430px;
      }

      .question {
        display: grid;
        grid-template-columns: 92px 0.78fr 1fr;
        gap: 28px;
        align-items: center;
        min-height: 148px;
        padding: 26px 30px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
      }

      .question .q {
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 34px;
        font-weight: 900;
      }

      .question h3,
      .question p {
        margin: 0;
      }

      .question h3 {
        font-size: 31px;
      }

      .model-map {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 130px minmax(0, 1fr);
        gap: 28px;
        align-items: center;
      }

      .model-layer {
        min-height: 360px;
        padding: 44px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.055);
      }

      .model-layer span {
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 22px;
        font-weight: 800;
      }

      .model-layer strong {
        display: block;
        margin: 28px 0 22px;
        color: var(--cream);
        font-family: "Noto Serif SC", serif;
        font-size: 43px;
        line-height: 1.22;
      }

      .connector {
        display: grid;
        width: 130px;
        height: 130px;
        place-items: center;
        border: 1px solid var(--line-strong);
        color: var(--gold);
        font-size: 26px;
        font-weight: 900;
      }

      .roadmap {
        position: relative;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 28px;
        margin-top: 12px;
      }

      .roadmap::before {
        content: "";
        position: absolute;
        left: 10%;
        right: 10%;
        top: 56px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
      }

      .roadmap .card {
        position: relative;
        padding-top: 94px;
      }

      .roadmap .time {
        position: absolute;
        top: 26px;
        left: 34px;
        padding: 8px 13px;
        border: 1px solid var(--line-strong);
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-weight: 800;
      }

      .scenario-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .scenario {
        min-height: 138px;
        padding: 26px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.045);
      }

      .scenario strong {
        display: block;
        margin-bottom: 10px;
        color: var(--cream);
        font-size: 27px;
      }

      .scenario span {
        color: var(--cream-2);
        font-size: 22px;
        line-height: 1.36;
      }

      .criteria-row,
      .score-guide {
        display: flex;
        gap: 14px;
        margin-top: 30px;
      }

      .criteria-row span,
      .score-guide span {
        padding: 11px 16px;
        border: 1px solid var(--line-strong);
        color: var(--gold-2);
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 19px;
        font-weight: 800;
      }

      .case-flow {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        width: 1460px;
      }

      .case-step {
        min-height: 170px;
        padding: 26px;
      }

      .case-step b {
        display: block;
        margin-bottom: 14px;
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
      }

      .case-step span {
        color: var(--cream);
        font-size: 28px;
        font-weight: 900;
        line-height: 1.25;
      }

      .case-step p {
        margin: 12px 0 0;
        font-size: 21px;
      }

      .case-board {
        display: grid;
        grid-template-columns: 0.88fr 1.12fr;
        gap: 26px;
        width: 1460px;
      }

      .case-board .panel {
        min-height: 430px;
      }

      .ledger {
        display: grid;
        gap: 14px;
        width: 1360px;
      }

      .ledger-row {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr 1fr;
        min-height: 72px;
        box-shadow: none;
      }

      .ledger-row span {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        border-right: 1px solid var(--line);
        color: var(--cream-2);
        font-size: 22px;
      }

      .ledger-row span:last-child {
        border-right: 0;
      }

      .ledger-row.head span {
        color: var(--gold-2);
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 18px;
        font-weight: 900;
      }

      .ledger-row span:first-child {
        color: var(--cream);
        font-weight: 900;
      }

      .flow-compare {
        display: grid;
        gap: 34px;
      }

      .flow-group h3 {
        margin-bottom: 16px;
      }

      .flow-line {
        display: grid;
        grid-template-columns: 1fr 40px 1fr 40px 1fr 40px 1fr;
        gap: 12px;
        align-items: center;
      }

      .flow-line span {
        display: grid;
        min-height: 88px;
        place-items: center;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--cream);
        font-size: 25px;
        font-weight: 900;
        text-align: center;
      }

      .flow-line i {
        height: 1px;
        background: currentColor;
      }

      .muted-flow {
        color: rgba(240, 236, 227, 0.32);
      }

      .muted-flow span {
        color: rgba(240, 236, 227, 0.46);
      }

      .active-flow {
        color: var(--gold);
      }

      .active-flow span {
        border-color: var(--line-strong);
        background: rgba(200, 168, 112, 0.13);
      }

      .asset-equation {
        text-align: center;
        font-size: 34px;
      }

      .pitfall-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .pitfall-list .card {
        min-height: 230px;
      }

      .worksheet {
        width: 1160px;
        padding: 48px 56px;
      }

      .worksheet label {
        display: block;
        margin-bottom: 12px;
        color: var(--cream);
        font-size: 25px;
        font-weight: 800;
      }

      .blank-line {
        height: 56px;
        margin-bottom: 30px;
        border-bottom: 2px dashed rgba(240, 236, 227, 0.32);
      }

      .score-row {
        display: grid;
        grid-template-columns: auto 1fr auto 1fr auto 1fr auto 1fr auto;
        gap: 14px;
        align-items: center;
        color: var(--gold);
        font-family: "IBM Plex Mono", monospace;
        font-size: 23px;
        font-weight: 900;
      }

      .score-row i {
        height: 2px;
        background: rgba(200, 168, 112, 0.38);
      }

      .table-card {
        width: 1370px;
        overflow: hidden;
        border: 1px solid var(--line);
      }

      .maturity-row {
        display: grid;
        grid-template-columns: 0.85fr repeat(3, 1fr);
        border-bottom: 1px solid var(--line);
      }

      .maturity-row:last-child {
        border-bottom: 0;
      }

      .maturity-row span {
        min-height: 76px;
        padding: 20px 22px;
        border-right: 1px solid var(--line);
        color: var(--cream-2);
        font-size: 24px;
        line-height: 1.3;
      }

      .maturity-row span:last-child {
        border-right: 0;
      }

      .maturity-row.head span {
        background: rgba(200, 168, 112, 0.16);
        color: var(--gold-2);
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 20px;
        font-weight: 900;
      }

      .maturity-row span:first-child {
        color: var(--cream);
        font-weight: 900;
      }

      .summary-ring {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
        width: 1280px;
        margin-bottom: 32px;
      }

      .summary-ring article {
        min-height: 220px;
        padding: 34px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
      }

      .summary-ring strong {
        display: block;
        margin-bottom: 16px;
        color: var(--gold);
        font-size: 32px;
      }

      .summary-ring span {
        color: var(--cream-2);
        font-size: 24px;
        line-height: 1.38;
      }

      .small-note {
        margin-top: 18px;
        color: var(--muted);
        font-family: "IBM Plex Mono", "Noto Serif SC", monospace;
        font-size: 17px;
        letter-spacing: 0.04em;
      }

      .progress-shell {
        position: fixed;
        left: 28px;
        right: 28px;
        bottom: 24px;
        z-index: 900;
        display: grid;
        grid-template-columns: 120px 1fr 240px;
        gap: 18px;
        align-items: center;
        color: rgba(240, 236, 227, 0.72);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        pointer-events: none;
      }

      .progress-track {
        height: 4px;
        overflow: hidden;
        background: rgba(240, 236, 227, 0.18);
      }

      .progress-bar {
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, var(--gold), var(--cream));
        transition: width 0.28s ease;
      }

      .deck-controls {
        position: fixed;
        left: 50%;
        bottom: 22px;
        z-index: 1000;
        display: flex;
        gap: 8px;
        padding: 8px;
        border: 1px solid rgba(240, 236, 227, 0.18);
        background: rgba(15, 22, 39, 0.74);
        transform: translateX(-50%);
        backdrop-filter: blur(14px);
      }

      .deck-controls button,
      .edit-toggle,
      .export-button {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;

      function renderSlide(slide, index) {
        const isCover = index === 0;
        const total = String(slides.length).padStart(2, "0");
        const page = String(index + 1).padStart(2, "0");
        const className = ["slide", slide.className || "", isCover ? "active visible" : ""].join(" ").trim();
        const footer = isCover
          ? ""
          : `<div class="footer"><span>Enterprise AI Playbook 2.0</span><span class="page">${page} / ${total}</span></div>`;
        return `
          <section class="${className}" data-title="${slide.title}">
            <div class="masthead reveal">
              <span class="mark">${slide.mastheadLeft}</span>
              <span>${slide.mastheadRight}</span>
            </div>
            ${slide.body}
            ${footer}
          </section>
        `;
      }

      document.getElementById("deckStage").innerHTML = slides.map(renderSlide).join("");

      class SlidePresentation {
        constructor() {
          this.stage = document.getElementById("deckStage");
          this.slides = Array.from(document.querySelectorAll(".slide"));
          this.counter = document.getElementById("slideCounter");
          this.progress = document.getElementById("progressBar");
          this.title = document.getElementById("slideTitle");
          this.current = 0;
          this.lastWheel = 0;
          this.setupStageScale();
          this.setupControls();
          this.setupTouch();
          this.setupWheel();
          this.setupHash();
          this.show(0, false);
        }

        setupStageScale() {
          const fit = () => {
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            const x = (window.innerWidth - 1920 * scale) / 2;
            const y = (window.innerHeight - 1080 * scale) / 2;
            this.stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
          };
          window.addEventListener("resize", fit);
          fit();
        }

        setupControls() {
          document.getElementById("prevBtn").addEventListener("click", () => this.prev());
          document.getElementById("nextBtn").addEventListener("click", () => this.next());
          document.getElementById("printBtn").addEventListener("click", () => window.print());
          document.addEventListener("keydown", (event) => {
            const editable = event.target && event.target.getAttribute("contenteditable") === "true";
            if (editable) return;
            if (["ArrowRight", "PageDown", " "].includes(event.key)) {
              event.preventDefault();
              this.next();
            }
            if (["ArrowLeft", "PageUp"].includes(event.key)) {
              event.preventDefault();
              this.prev();
            }
            if (event.key === "Home") {
              event.preventDefault();
              this.show(0);
            }
            if (event.key === "End") {
              event.preventDefault();
              this.show(this.slides.length - 1);
            }
            if (event.key.toLowerCase() === "p") {
              event.preventDefault();
              window.print();
            }
          });
        }

        setupTouch() {
          let startX = 0;
          let startY = 0;
          document.addEventListener("touchstart", (event) => {
            const touch = event.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
          }, { passive: true });
          document.addEventListener("touchend", (event) => {
            const touch = event.changedTouches[0];
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) {
              dx < 0 ? this.next() : this.prev();
            }
          }, { passive: true });
        }

        setupWheel() {
          document.addEventListener("wheel", (event) => {
            const now = Date.now();
            if (now - this.lastWheel < 520 || Math.abs(event.deltaY) < 28) return;
            this.lastWheel = now;
            event.deltaY > 0 ? this.next() : this.prev();
          }, { passive: true });
        }

        setupHash() {
          const fromHash = () => {
            const match = window.location.hash.match(/slide-(\d+)/);
            if (match) this.show(Number(match[1]) - 1, false);
          };
          window.addEventListener("hashchange", fromHash);
          fromHash();
        }

        show(index, updateHash = true) {
          this.current = Math.max(0, Math.min(index, this.slides.length - 1));
          this.slides.forEach((slide, i) => {
            slide.classList.toggle("active", i === this.current);
            slide.classList.toggle("visible", i === this.current);
          });
          const number = String(this.current + 1).padStart(2, "0");
          const total = String(this.slides.length).padStart(2, "0");
          this.counter.textContent = `${number} / ${total}`;
          this.progress.style.width = `${((this.current + 1) / this.slides.length) * 100}%`;
          this.title.textContent = this.slides[this.current].dataset.title || "";
          if (updateHash) history.replaceState(null, "", `#slide-${this.current + 1}`);
        }

        next() {
          this.show(this.current + 1);
        }

        prev() {
          this.show(this.current - 1);
        }
      }

      class InlineEditor {
        constructor() {
          this.isActive = false;
          this.key = "ai-transformation-deck-v2-edits";
          this.toggle = document.getElementById("editToggle");
          this.exportButton = document.getElementById("exportButton");
          this.hotzone = document.querySelector(".edit-hotzone");
          this.toast = document.getElementById("toast");
          this.editables = Array.from(document.querySelectorAll("[data-editable]"));
          this.hideTimer = null;
          this.load();
          this.bind();
        }

        bind() {
          this.toggle.addEventListener("click", () => this.toggleMode());
          this.exportButton.addEventListener("click", () => this.download());
          this.hotzone.addEventListener("click", () => this.toggleMode());
          [this.hotzone, this.toggle, this.exportButton].forEach((el) => {
            el.addEventListener("mouseenter", () => this.showButtons());
            el.addEventListener("mouseleave", () => this.scheduleHide());
          });
          document.addEventListener("keydown", (event) => {
            const editable = event.target && event.target.getAttribute("contenteditable") === "true";
            if ((event.key === "e" || event.key === "E") && !editable) {
              event.preventDefault();
              this.toggleMode();
            }
          });
          this.editables.forEach((el, index) => {
            el.dataset.editId = `editable-${index}`;
            el.addEventListener("input", () => this.save());
          });
        }

        showButtons() {
          clearTimeout(this.hideTimer);
          this.toggle.classList.add("show");
          this.exportButton.classList.add("show");
        }

        scheduleHide() {
          clearTimeout(this.hideTimer);
          this.hideTimer = setTimeout(() => {
            if (!this.isActive) {
              this.toggle.classList.remove("show");
              this.exportButton.classList.remove("show");
            }
          }, 400);
        }

        toggleMode() {
          this.isActive = !this.isActive;
          document.body.classList.toggle("editing", this.isActive);
          this.toggle.classList.toggle("active", this.isActive);
          this.exportButton.classList.toggle("active", this.isActive);
          this.editables.forEach((el) => {
            el.setAttribute("contenteditable", this.isActive ? "true" : "false");
          });
          this.showToast(this.isActive ? "编辑模式已开启，点文字即可修改。" : "编辑模式已关闭，修改已自动保存。");
        }

        save() {
          const data = {};
          this.editables.forEach((el) => {
            data[el.dataset.editId] = el.innerHTML;
          });
          localStorage.setItem(this.key, JSON.stringify(data));
        }

        load() {
          try {
            const data = JSON.parse(localStorage.getItem(this.key) || "{}");
            this.editables.forEach((el, index) => {
              const value = data[`editable-${index}`];
              if (value) el.innerHTML = value;
            });
          } catch {
            localStorage.removeItem(this.key);
          }
        }

        download() {
          this.save();
          const blob = new Blob([document.documentElement.outerHTML], { type: "text/html;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "AI转型闭门分享PPT-精简版.html";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          this.showToast("已导出当前 HTML。");
        }

        showToast(text) {
          this.toast.textContent = text;
          this.toast.classList.add("show");
          clearTimeout(this.toastTimer);
          this.toastTimer = setTimeout(() => this.toast.classList.remove("show"), 2200);
        }
      }

      window.deck = new SlidePresentation();
      window.editor = new InlineEditor();
    </script>
  </body>
</html>
