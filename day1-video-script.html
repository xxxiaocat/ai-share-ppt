<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
/* ===========================================
   CSS CUSTOM PROPERTIES (THEME)
   Warm editorial — paper-meets-screen
   =========================================== */
:root {
  --stage-bg: #2c2416;
  --slide-bg: #f9f4eb;
  --paper: #f5efe4;
  --paper-2: #ede5d8;
  --ink: #1a1714;
  --ink-2: #3d3530;
  --ink-3: #716760;
  --amber: #b8863a;
  --amber-light: #dfb87a;
  --amber-bg: rgba(184, 134, 58, 0.09);
  --line: rgba(26, 23, 20, 0.10);
  --line-strong: rgba(184, 134, 58, 0.35);
  --accent-red: #b34a3a;
  --accent-green: #4a7b5c;
  --font-display: 'Noto Serif SC', serif;
  --font-body: 'DM Sans', 'Noto Serif SC', sans-serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-normal: 0.6s;
}

/* ===========================================
   viewport-base.css — MANDATORY FIXED STAGE
   =========================================== */
html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--stage-bg); }
.deck-viewport { position: fixed; inset: 0; overflow: hidden; background: var(--stage-bg); }
.deck-stage {
  position: absolute; left: 0; top: 0;
  width: 1920px; height: 1080px;
  overflow: hidden; transform-origin: 0 0;
  background: var(--slide-bg);
}
.slide {
  position: absolute; inset: 0; width: 1920px; height: 1080px;
  overflow: hidden; display: block; visibility: hidden;
  opacity: 0; pointer-events: none;
  background: var(--slide-bg);
}
.slide.active, .slide.visible { visibility: visible; opacity: 1; pointer-events: auto; z-index: 1; }
img, video, canvas, svg { max-width: 100%; max-height: 100%; }
.deck-controls { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 1000; }

@media print {
  html, body { width: 1920px; height: auto; overflow: visible; background: #fff; }
  .deck-viewport { position: static; overflow: visible; background: #fff; }
  .deck-stage { position: static; width: auto; height: auto; transform: none !important; background: none; }
  .slide { position: relative; display: block !important; visibility: visible !important; opacity: 1 !important; pointer-events: auto !important; width: 1920px; height: 1080px; break-after: page; page-break-after: always; }
  .slide:last-child { break-after: auto; }
  .deck-controls { display: none !important; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.2s !important; } }

/* ===========================================
   ANIMATIONS — staggered reveal
   =========================================== */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity var(--duration-normal) var(--ease-out-expo), transform var(--duration-normal) var(--ease-out-expo); }
.slide.visible .reveal { opacity: 1; transform: translateY(0); }
.slide.visible .delay-1 { transition-delay: 0.08s; }
.slide.visible .delay-2 { transition-delay: 0.16s; }
.slide.visible .delay-3 { transition-delay: 0.24s; }
.slide.visible .delay-4 { transition-delay: 0.32s; }
.slide.visible .delay-5 { transition-delay: 0.40s; }

/* ===========================================
   LAYOUT — reusable components
   =========================================== */
* { margin: 0; padding: 0; box-sizing: border-box; }

.cover-slide { background: var(--slide-bg); }
.cover-slide::after {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(184, 134, 58, 0.10), transparent),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(26, 23, 20, 0.04), transparent);
  pointer-events: none;
}

.time-block {
  position: absolute; top: 96px; left: 118px;
  font-family: 'DM Sans', monospace; font-size: 18px; font-weight: 800;
  color: var(--amber); letter-spacing: 0.04em;
}
.time-block span { background: var(--amber-bg); padding: 6px 14px; border-radius: 4px; }

.slide-title {
  position: absolute; left: 118px; top: 146px;
  font-family: var(--font-display); font-size: 48px; font-weight: 900;
  color: var(--ink); line-height: 1.18;
  max-width: 1400px;
}

.slide-sub {
  position: absolute; left: 118px; top: 224px;
  font-family: var(--font-body); font-size: 22px; color: var(--ink-3);
  max-width: 900px;
}

.content-area {
  position: absolute; left: 118px; top: 280px; right: 118px; bottom: 130px;
  display: flex; gap: 40px;
}

.col-visual {
  flex: 0 0 600px;
  background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
  padding: 36px;
  display: flex; flex-direction: column; gap: 16px;
}

.col-narration {
  flex: 1;
  background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
  padding: 36px;
  display: flex; flex-direction: column; gap: 12px;
}

.section-label {
  font-family: 'DM Sans', monospace; font-size: 13px; font-weight: 700;
  color: var(--amber); letter-spacing: 0.06em; text-transform: uppercase;
}

.vis-line {
  font-family: var(--font-body); font-size: 20px; line-height: 1.55; color: var(--ink-2);
}

.narration-text {
  font-family: var(--font-display); font-size: 27px; line-height: 1.45; color: var(--ink);
  font-weight: 500;
}
.narration-text em {
  color: var(--amber); font-style: normal; font-weight: 700;
}

.note-text {
  font-family: var(--font-body); font-size: 17px; line-height: 1.5; color: var(--ink-3);
}

.tag-hl {
  display: inline-block; font-family: 'DM Sans', monospace; font-size: 12px;
  background: var(--amber-bg); color: var(--amber); font-weight: 700;
  padding: 3px 10px; border-radius: 3px;
}

/* ── Timeline overview slide ── */
.timeline-grid {
  position: absolute; left: 118px; top: 220px; right: 118px; bottom: 120px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  align-content: start;
}
.timeline-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
  padding: 20px;
}
.timeline-card .seg-label {
  font-family: 'DM Sans', monospace; font-size: 15px; font-weight: 800; color: var(--amber);
  margin-bottom: 8px;
}
.timeline-card .seg-time {
  display: inline-block; font-family: 'DM Sans', monospace; font-size: 11px;
  background: var(--amber-bg); color: var(--amber); padding: 2px 8px; border-radius: 3px;
  margin-bottom: 10px;
}
.timeline-card .seg-text {
  font-family: var(--font-display); font-size: 18px; line-height: 1.4; color: var(--ink-2);
  font-weight: 500;
}

/* ── Materials / Tips slides ── */
.materials-grid {
  position: absolute; left: 118px; top: 220px; right: 118px; bottom: 120px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
}
.material-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 16px; padding: 32px;
}
.material-card h3 {
  font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--ink);
  margin-bottom: 8px;
}
.material-card .cat {
  font-family: 'DM Sans', monospace; font-size: 13px; color: var(--amber); font-weight: 700;
  margin-bottom: 18px;
}
.material-card li {
  font-family: var(--font-body); font-size: 22px; line-height: 1.5; color: var(--ink-2);
  margin: 10px 0; list-style: none; padding-left: 0;
}
.material-card li::before { content: '· '; color: var(--amber); font-weight: 700; }

/* ── Progress / counter ── */
.progress-shell {
  position: fixed; left: 28px; right: 28px; bottom: 52px; z-index: 900;
  display: grid; grid-template-columns: 120px 1fr 240px; gap: 18px; align-items: center;
  color: rgba(249, 244, 235, 0.7); font-family: 'DM Sans', monospace; font-size: 13px;
  pointer-events: none;
}
.progress-track { height: 3px; overflow: hidden; background: rgba(249, 244, 235, 0.15); }
.progress-bar { width: 0; height: 100%; background: linear-gradient(90deg, var(--amber-light), #f5efe4); transition: width 0.28s ease; }

/* ── Controls ── */
.deck-controls {
  display: flex; gap: 6px; padding: 6px;
  border: 1px solid rgba(249, 244, 235, 0.18);
  background: rgba(44, 36, 22, 0.8); border-radius: 8px;
  backdrop-filter: blur(10px);
}
.deck-controls button {
  display: grid; width: 36px; height: 36px; place-items: center;
  border: 1px solid rgba(249, 244, 235, 0.13);
  background: rgba(255, 255, 255, 0.05); border-radius: 4px;
  color: rgba(249, 244, 235, 0.8); cursor: pointer;
  font: 700 16px/1 'DM Sans', monospace;
}
.deck-controls button:hover { border-color: var(--amber); color: var(--amber-light); }

/* ── Cover specific ── */
.cover-title {
  position: absolute; left: 118px; top: 246px;
}
.cover-title .series { font-family: 'DM Sans', monospace; font-size: 20px; color: var(--amber); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 20px; }
.cover-title h1 { font-family: var(--font-display); font-size: 88px; font-weight: 900; color: var(--ink); line-height: 1.08; }
.cover-title h1 em { color: var(--amber); font-style: normal; }
.cover-title .sub { font-family: var(--font-body); font-size: 32px; color: var(--ink-3); margin-top: 24px; line-height: 1.45; max-width: 1000px; }
.cover-meta {
  position: absolute; left: 118px; bottom: 120px;
  display: flex; align-items: center; gap: 28px;
}
.cover-meta .line { width: 80px; height: 2px; background: var(--amber); }
.cover-meta div { font-family: var(--font-body); }
.cover-meta strong { display: block; font-size: 26px; color: var(--ink); }
.cover-meta span { font-size: 17px; color: var(--ink-3); }

.cover-badge {
  position: absolute; right: 118px; bottom: 120px;
  border: 1px solid var(--line-strong); padding: 10px 20px;
  font-family: 'DM Sans', monospace; font-size: 14px; color: var(--amber);
  border-radius: 6px;
}

/* ── Stage numbers on screen slides ── */
.screen-note {
  position: absolute; right: 118px; bottom: 120px;
  font-family: 'DM Sans', monospace; font-size: 14px; color: var(--ink-3);
  border: 1px solid var(--line); padding: 8px 16px; border-radius: 6px;
}

/* ── Timeline connector ── */
.timeline-connector {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}
.timeline-connector .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
.timeline-connector .bar { height: 2px; flex: 1; background: var(--line-strong); }
.timeline-connector .total { font-family: 'DM Sans', monospace; font-size: 14px; color: var(--ink-3); }
</style>
</head>

// ── Render ──
function renderSlide(slide, index) {
  const isCover = index === 0 || index === slides.length - 1;
  const total = String(slides.length).padStart(2, '0');
  const page = String(index + 1).padStart(2, '0');
  const cls = ['slide', isCover ? 'active visible' : '', index === 0 || index === slides.length - 1 ? 'cover-slide' : ''].filter(Boolean).join(' ');
  return `<section class="${cls}" data-title="${slide.title}">${slide.body}</section>`;
}

document.getElementById('deckStage').innerHTML = slides.map(renderSlide).join('');

// ── Presentation Controller ──
class Deck {
  constructor() {
    this.stage = document.getElementById('deckStage');
    this.slides = Array.from(document.querySelectorAll('.slide'));
    this.counter = document.getElementById('slideCounter');
    this.progress = document.getElementById('progressBar');
    this.title = document.getElementById('slideTitle');
    this.current = 0;
    this.lastWheel = 0;
    this.fit();
    this.bind();
    this.show(0, false);
    window.addEventListener('resize', () => this.fit());
  }
  fit() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    this.stage.style.transform = `translate(${(window.innerWidth - 1920*s)/2}px, ${(window.innerHeight - 1080*s)/2}px) scale(${s})`;
  }
  bind() {
    document.getElementById('prevBtn').addEventListener('click', () => this.prev());
    document.getElementById('nextBtn').addEventListener('click', () => this.next());
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.addEventListener('keydown', e => {
      const ed = e.target && e.target.getAttribute('contenteditable') === 'true';
      if (ed) return;
      if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); this.next(); }
      if (['ArrowLeft','PageUp'].includes(e.key)) { e.preventDefault(); this.prev(); }
      if (e.key === 'Home') { e.preventDefault(); this.show(0); }
      if (e.key === 'End') { e.preventDefault(); this.show(this.slides.length - 1); }
      if (e.key.toLowerCase() === 'p') { e.preventDefault(); window.print(); }
    });
    document.addEventListener('wheel', e => {
      const now = Date.now();
      if (now - this.lastWheel < 520 || Math.abs(e.deltaY) < 28) return;
      this.lastWheel = now; e.deltaY > 0 ? this.next() : this.prev();
    }, { passive: true });
    let sx = 0, sy = 0;
    document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) dx < 0 ? this.next() : this.prev();
    }, { passive: true });
  }
  show(index, updateHash = true) {
    this.current = Math.max(0, Math.min(index, this.slides.length - 1));
    this.slides.forEach((s, i) => { s.classList.toggle('active', i === this.current); s.classList.toggle('visible', i === this.current); });
    const num = String(this.current + 1).padStart(2, '0'), tot = String(this.slides.length).padStart(2, '0');
    this.counter.textContent = `${num} / ${tot}`;
    this.progress.style.width = `${((this.current + 1) / this.slides.length) * 100}%`;
    this.title.textContent = this.slides[this.current].dataset.title || '';
    if (updateHash) history.replaceState(null, '', `#slide-${this.current + 1}`);
  }
  next() { this.show(this.current + 1); }
  prev() { this.show(this.current - 1); }
}

window.deck = new Deck();
</script>
